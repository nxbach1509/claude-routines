name: Daily Real Estate Report — Vietnam

on:
  schedule:
    # 07:30 ICT (UTC+7) = 00:30 UTC | Mon (1) – Thu (4) in cron notation
    - cron: '30 0 * * 1-4'

  workflow_dispatch:
    inputs:
      day_override:
        description: 'Force a specific session (0=Mon/Residential 1=Tue/Hospitality 2=Wed/Retail-Office 3=Thu/Industrial)'
        required: false
        default: ''
        type: string

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate & send report
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_SENDER:       ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          if [ -n "${{ github.event.inputs.day_override }}" ]; then
            python scripts/daily_report.py --day ${{ github.event.inputs.day_override }}
          else
            python scripts/daily_report.py
          fi
