name: Daily Real Estate Report — Vietnam

on:
  schedule:
    # 07:30 ICT (UTC+7) = 00:30 UTC | Mon–Thu only
    - cron: '30 0 * * 1-4'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — generate report but do NOT send email'
        type: boolean
        default: false
      session:
        description: 'Force session (A=Residential, B=Hospitality, C=Retail&Office, D=Industrial). Leave empty for auto.'
        type: choice
        options: ['', 'A', 'B', 'C', 'D']
        default: ''

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate & send report
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_SENDER:       ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: |
          ARGS=""
          [[ "${{ inputs.dry_run }}" == "true" ]] && ARGS="$ARGS --dry-run"
          [[ -n "${{ inputs.session }}" ]] && ARGS="$ARGS --session ${{ inputs.session }}"
          python scripts/daily_report.py $ARGS
