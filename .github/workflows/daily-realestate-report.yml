name: Daily Real Estate Report — Vietnam

on:
  schedule:
    # 07:30 ICT (UTC+7) = 00:30 UTC | Mon (1) – Thu (4)
    - cron: '30 0 * * 1-4'

  workflow_dispatch:
    inputs:
      session_override:
        description: >
          Force a specific session (A=Residential, B=Hospitality,
          C=Retail & Office, D=Industrial). Leave blank to use today's schedule.
        required: false
        default: ''
        type: choice
        options:
          - ''
          - A
          - B
          - C
          - D

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate & send report
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_SENDER:       ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SESSION_OVERRIDE:   ${{ inputs.session_override }}
        run: python scripts/daily_report.py

      - name: Summary
        if: always()
        run: |
          echo "## Report Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Date (UTC):** $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "- **Session override:** ${{ inputs.session_override || '(auto from schedule)' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Recipient:** nxbach1509@gmail.com" >> $GITHUB_STEP_SUMMARY
